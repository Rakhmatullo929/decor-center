services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: decor
      POSTGRES_USER: decor
      POSTGRES_PASSWORD: decor
    ports:
      # 5433 on the host by default (local Postgres already occupies 5432); override with
      # DB_HOST_PORT if 5433 is taken too, e.g. DB_HOST_PORT=5434 docker compose up -d db.
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      # postgres:18 keeps PGDATA under /var/lib/postgresql/18/, not .../data
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decor -d decor"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_initial_data &&
             python manage.py seed_surveys &&
             python manage.py seed_demo_data &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgres://decor:decor@db:5432/decor
    ports:
      # Override BACKEND_HOST_PORT if 8000 is taken, e.g. BACKEND_HOST_PORT=8010.
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      # Persist uploaded media (employee photos / face samples) across container
      # rebuilds and restarts — otherwise enrolled faces are wiped on every `up`.
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # The browser runs on the host, so it reaches the backend via localhost.
      # Point this at the backend's published host port (BACKEND_HOST_PORT).
      REACT_APP_HOST_API: ${REACT_APP_HOST_API:-http://localhost:8000}
    ports:
      # Override FRONTEND_HOST_PORT if 3000 is taken, e.g. FRONTEND_HOST_PORT=3010.
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    # CRA dev server exits without an attached stdin/tty
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  pgdata:
  media:
