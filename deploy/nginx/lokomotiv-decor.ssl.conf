server {
    listen 80;
    server_name lokomotiv-decor.uz www.lokomotiv-decor.uz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name lokomotiv-decor.uz www.lokomotiv-decor.uz;

    ssl_certificate     /etc/letsencrypt/live/lokomotiv-decor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lokomotiv-decor.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    location / {
        proxy_pass http://decor-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
