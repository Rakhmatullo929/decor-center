# Backend API (Django/gunicorn) — api.test.monday-projects.uz
# Installed to /etc/nginx/sites-available/decor-test-api and symlinked into sites-enabled/.
# Django admin/DRF/Swagger static is served by WhiteNoise through the proxy, so no /static/
# alias is needed here. /media/ (uploaded face-enrollment photos) is served by Django's
# static_serve through the proxy too (config/urls.py) — an nginx alias into the deploy user's
# home dir returns 403 because the worker can't traverse /home/<user>, so we proxy instead.
# HTTP-only initially; `certbot --nginx` upgrades to HTTPS once DNS resolves.
server {
    listen 80;
    server_name api.test.monday-projects.uz;

    # Face enrollment uploads several photos per request — lift nginx's 1 MB default.
    client_max_body_size 20m;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/decor-test-backend.sock;
    }
}
