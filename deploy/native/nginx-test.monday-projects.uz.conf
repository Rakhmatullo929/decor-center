# Frontend (React SPA) — test.monday-projects.uz
# Installed to /etc/nginx/sites-available/decor-test and symlinked into sites-enabled/.
# HTTP-only initially; `certbot --nginx` (deploy/native/tls-golive.sh) upgrades this to
# HTTPS + a 80->443 redirect once DNS resolves, exactly like the other sites on this host.
server {
    listen 80;
    server_name test.monday-projects.uz;

    root /home/al-bukhari/decor-test/decor-center/frontend/build;
    index index.html;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Long-cache the hashed CRA build assets.
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA fallback: every unknown path serves index.html.
    location / {
        try_files $uri /index.html;
    }
}
