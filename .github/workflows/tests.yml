name: Tests

# Reusable check suite (backend ruff+pytest, frontend build). Called by:
#   - ci.yml               on PRs and pushes to main
#   - deploy-production.yml as the gate before deploying to prod
on:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: decor
          POSTGRES_USER: decor
          POSTGRES_PASSWORD: decor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decor -d decor"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: postgres://decor:decor@localhost:5432/decor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000
      - name: Build
        run: yarn build
        env:
          CI: false
          REACT_APP_HOST_API: https://api.test.monday-projects.uz
