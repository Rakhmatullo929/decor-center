name: Deploy (test)

# Auto-deploy the TEST stand (test.monday-projects.uz / api-test.monday-projects.uz)
# on every push to main. Requires these repo secrets (Settings -> Secrets -> Actions):
#   TEST_DEPLOY_HOST  = 144.91.64.70
#   TEST_DEPLOY_USER  = al-bukhari
#   TEST_DEPLOY_PORT  = 22
#   TEST_DEPLOY_KEY   = <private key whose public half is in the server's authorized_keys>
# The server-side work lives in deploy/native/deploy-native.sh.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TEST_DEPLOY_HOST }}
          username: ${{ secrets.TEST_DEPLOY_USER }}
          key: ${{ secrets.TEST_DEPLOY_KEY }}
          port: ${{ secrets.TEST_DEPLOY_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            bash /home/al-bukhari/decor-test/decor-center/deploy/native/deploy-native.sh
